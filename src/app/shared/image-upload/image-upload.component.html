<div class="flex w-full h-full max-h-full gap-6 overflow-hidden">
    <div class="flex items-center gap-4 w-2/3 h-full min-h-0">
        <label (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)" (drop)="onDrop($event)"
            [class.border-purple-500]="isDragging" [class.border-4]="isDragging" [class.bg-purple-100]="isDragging"
            for="dropzone-file"
            class="flex flex-col items-center justify-center w-full h-full border-2 border-gray-300 border-dashed rounded-lg cursor-pointer">
            <p class="mb-2 text-lg">Click to upload or drag and drop</p>
            <input type="file" name="" id="dropzone-file" class="hidden">
        </label>
    </div>
    @if(imageSrc()){
    <div class="flex flex-col w-1/3 h-full min-h-0 gap-3">
        <div class="flex justify-center flex-1 border-2 border-gray-300 rounded-lg overflow-hidden">
            <img src={{imageSrc()}} alt="image preview" class="aspect-square object-cover rounded-lg">

        </div>
        <div class="flex w-full gap-3">
            <button (click)="onCancel()" class="btn btn-secondary flex-1">Cancel</button>
            <button (click)="onUploadFile()" class="btn btn-primary flex-1">Upload image</button>
        </div>

    </div>
    }

</div>
